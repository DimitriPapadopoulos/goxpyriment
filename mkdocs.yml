site_name: goxpyriment
site_description: A Go framework for behavioral and psychological experiments
site_url: https://chrplr.github.io/goxpyriment
repo_url: https://github.com/chrplr/goxpyriment
repo_name: chrplr/goxpyriment

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: GettingStarted.md
  - User Manual: UserManual.md
  - API Reference: API.md
  - SDL Usage Notes: library_usage.md
  - Gallery of Examples: GalleryOfExamples.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
