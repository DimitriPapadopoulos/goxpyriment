name: Build example installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-all:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install SDL3 (for bundling in Linux releases)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsdl3-0
          # Also install arm64 variant for the arm64 tarball.
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y libsdl3-0:arm64

      - name: Build all platforms
        run: bash examples/installers/build-all-platforms.sh

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: examples/installers/goxpyriment-examples-windows-x86_64.zip

      - name: Upload macOS arm64 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: examples/installers/goxpyriment-examples-macos-arm64.zip

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: examples/installers/goxpyriment-examples-linux-x86_64.tar.gz

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: examples/installers/goxpyriment-examples-linux-arm64.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: [build-all]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum \
            goxpyriment-examples-windows-x86_64.zip \
            goxpyriment-examples-macos-arm64.zip \
            goxpyriment-examples-linux-x86_64.tar.gz \
            goxpyriment-examples-linux-arm64.tar.gz \
            > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Goxpyriment examples ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/goxpyriment-examples-windows-x86_64.zip
            artifacts/goxpyriment-examples-macos-arm64.zip
            artifacts/goxpyriment-examples-linux-x86_64.tar.gz
            artifacts/goxpyriment-examples-linux-arm64.tar.gz
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
